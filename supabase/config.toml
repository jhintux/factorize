# Minimal Supabase config for migration management.
# Link your project with: supabase link --project-ref <ref>
# Apply migrations with: supabase db push

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
