[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
factorize = "6YWgPX8CbreGMdPAkCnXxLG5xW9T8LiTQHqafP3C3GhT"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "TS_NODE_SKIP_IGNORE=true yarn run ts-mocha -p ./tsconfig.test.json -t 1000000 \"tests/**/*.ts\""
